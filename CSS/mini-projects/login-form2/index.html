<html lang="en">

  <link rel="stylesheet" href="style.css">

<body>
  <div class="container">
    <form>
      <h1>Welcome back</h1>
      <p>Please enter your details</p>

        <input type="email" class="contents input " name="email" id="email">

      <div class="labels">
        <label class="contents" for="password">Password</label>
        <input class="contents input " type="password" name="password" id="password">
      </div>

      <div class="options">
        <div>
        <input type="checkbox">
        <label>Remember for 30 days</label>
    </div>

    <a href="">Forgot password</a>
</div>

      <div>
        <button class="sign-in">Sign in</button>
      </div>

      <div>
        <button class="google-button">
        <a href="">
          <img class="google" src="google.jpg" alt="">
        </a> Sign in with Google 
        </button>
      </div>

      <div>
      <p class="lower">Don't have an account? 
      <a href="" class="sign-up">Sign up</a>
      </p>
      </div>
    </form>
  </div>
</body>
</html>
